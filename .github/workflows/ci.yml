name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Typecheck, Test, Prisma
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ecommerce
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce -d ecommerce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm --filter @ecommerce/database prisma:validate
        env:
          DATABASE_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public
          DIRECT_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public

      - name: Prisma generate
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public
          DIRECT_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public

      - name: Apply database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public
          DIRECT_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public

      - name: Typecheck
        run: pnpm typecheck

      - name: Build API
        run: pnpm --filter @ecommerce/api build

      - name: Build worker
        run: pnpm --filter @ecommerce/worker build

      - name: Build web
        run: pnpm --filter @ecommerce/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_TENANT_ID: 00000000-0000-0000-0000-000000000000
          NEXT_PUBLIC_TENANT_SLUG: demo-store

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration
        env:
          RUN_INTEGRATION: "true"
          DATABASE_URL: postgresql://ecommerce:ecommerce@localhost:5432/ecommerce?schema=public
          REDIS_URL: redis://localhost:6379/15
